{% extends 'base.html' %}

{% block content %}
<h2>System Login</h2>

{% if error_message %}
    <p style="color: red;">{{ Invalid user name or password. }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
   {{ form.as_p }}
    <button type="submit">Login</button>

</form>
{% endblock %}
